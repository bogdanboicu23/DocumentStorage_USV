services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: documentstorage-db
    environment:
      SA_PASSWORD: "reallyStrongPwd123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -z localhost 1433 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: DocumentStorage.API/Dockerfile
    container_name: documentstorage-api
    ports:
      - "5161:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=sqlserver;Database=DocumentStorageDB;User Id=sa;Password=reallyStrongPwd123;TrustServerCertificate=True;
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DocumentStorageDB_CodeFirst;User Id=sa;Password=reallyStrongPwd123;TrustServerCertificate=True;
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: DocumentStorage.Client/Dockerfile
    container_name: documentstorage-client
    ports:
      - "5076:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://api:8080
    depends_on:
      - api

volumes:
  sqlserver-data:
  api-uploads: