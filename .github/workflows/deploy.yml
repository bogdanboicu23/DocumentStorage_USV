name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: document-storage
  GKE_ZONE: europe-north2-a
  REGISTRY: europe-north2-docker.pkg.dev
  REPOSITORY: documentstorage

jobs:
  deploy:
    name: Build & Deploy to GKE
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-north2-docker.pkg.dev --quiet

      - name: Build & push API image
        run: |
          docker build \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/api:${{ github.sha }} \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/api:latest \
            -f src/DocumentStorage.API/Dockerfile \
            src
          docker push --all-tags $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/api

      - name: Build & push Client image
        run: |
          docker build \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/client:${{ github.sha }} \
            -t $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/client:latest \
            -f src/DocumentStorage.Client/Dockerfile \
            src
          docker push --all-tags $REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/client

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/sqlserver.yaml
          kubectl rollout status deployment/sqlserver -n documentstorage --timeout=120s
          kubectl apply -f k8s/api.yaml
          kubectl apply -f k8s/client.yaml

      - name: Update images and wait for rollout
        run: |
          kubectl set image deployment/api \
            api=$REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/api:${{ github.sha }} \
            -n documentstorage
          kubectl set image deployment/client \
            client=$REGISTRY/$GCP_PROJECT_ID/$REPOSITORY/client:${{ github.sha }} \
            -n documentstorage
          kubectl rollout status deployment/api -n documentstorage --timeout=180s
          kubectl rollout status deployment/client -n documentstorage --timeout=180s
