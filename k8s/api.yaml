apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-uploads-pvc
  namespace: documentstorage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: documentstorage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-sql
          image: mcr.microsoft.com/dotnet/sdk:8.0
          command: ['bash', '-c', 'for i in $(seq 1 30); do echo "Waiting for SQL Server (attempt $i)..." && echo > /dev/tcp/sqlserver-svc/1433 && echo "SQL Server is ready!" && exit 0; sleep 2; done; echo "SQL Server not ready after 30 attempts"; exit 1']
      containers:
        - name: api
          image: europe-north2-docker.pkg.dev/project-c257fdcb-0ada-47dd-add/documentstorage/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: documentstorage-config
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documentstorage-secret
                  key: SA_PASSWORD
            - name: JwtSettings__SecretKey
              valueFrom:
                secretKeyRef:
                  name: documentstorage-secret
                  key: JWT_SECRET
            - name: ConnectionStrings__Default
              value: "Server=sqlserver-svc,1433;Database=DocumentStorageDB;User Id=sa;Password=reallyStrongPassword123!;TrustServerCertificate=True;Encrypt=false;"
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver-svc,1433;Database=DocumentStorageDB_CodeFirst;User Id=sa;Password=reallyStrongPassword123!;TrustServerCertificate=True;Encrypt=false;"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: api-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: documentstorage
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
