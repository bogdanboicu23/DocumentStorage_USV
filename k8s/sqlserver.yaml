apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data-pvc
  namespace: documentstorage
spec:
  accessModes:
     - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: documentstorage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/azure-sql-edge:latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                    name: documentstorage-secret
                    key: SA_PASSWORD
          volumeMounts:
              - name: sqlserver-data
                mountPath: /var/opt/mssql
      volumes:
          - name: sqlserver-data
            persistentVolumeClaim:
              claimName: sqlserver-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver-svc
  namespace: documentstorage
spec:
  selector:
    app: sqlserver
  ports:
    - port: 1433
      targetPort: 1433
  type: ClusterIP