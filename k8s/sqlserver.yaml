---
apiVersion: v1
kind: Namespace
metadata:
  name: documentstorage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data-pvc
  namespace: documentstorage
spec:
  storageClassName: standard-rwo
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: documentstorage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      # --- THIS IS THE FIX ---
      initContainers:
        - name: init-permissions
          image: busybox:1.28
          command: ["sh", "-c", "chown -R 10001:0 /var/opt/mssql && chmod -R 770 /var/opt/mssql"]
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
      # ------------------------
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documentstorage-secret
                  key: MSSQL_SA_PASSWORD
          ports:
            - containerPort: 1433
          resources:
            requests:
              memory: "1500Mi"
              cpu: "500m"
            limits:
              memory: "2500Mi"
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver-svc
  namespace: documentstorage
spec:
  selector:
    app: sqlserver
  ports:
    - port: 1433
      targetPort: 1433
  type: ClusterIP